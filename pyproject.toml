[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sureguard-code-scanner"
version = "0.1.0"
description = "AI-aware secure code review as an MCP server. Catches hallucinated packages, insecure patterns, secrets, and known CVEs in code generated by AI agents."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Sureguard contributors" }]
keywords = ["mcp", "security", "sast", "sca", "ai", "code-review", "vibe-coding"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
]
dependencies = [
    "mcp>=1.2.0",
    "httpx>=0.27.0",
    "pydantic>=2.7.0",
    "pyyaml>=6.0.1",
    "unidiff>=0.7.5",
    "packaging>=23.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.21.0",
    "ruff>=0.5.0",
]
web = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "jinja2>=3.1.0",
    "python-multipart>=0.0.9",
]

[project.scripts]
sureguard-code-scanner = "sureguard_code_scanner.__main__:main"
sureguard = "sureguard_code_scanner.cli:main"

[project.urls]
Homepage = "https://github.com/ExecutiveKoder/sureguard-code-scanner"
Issues = "https://github.com/ExecutiveKoder/sureguard-code-scanner/issues"

[tool.hatch.build.targets.wheel]
packages = ["server/sureguard_code_scanner"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM"]
ignore = ["E501"]
